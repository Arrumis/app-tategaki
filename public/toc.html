<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>目次 - tategaki</title>
    <link rel="icon" href="/favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* TOC Specific Overrides */
        body {
            overflow-y: auto !important;
            height: auto !important;
            background-color: var(--c-bg);
            color: var(--c-text);
        }

        .container {
            max-width: 800px;
            padding: 0 16px 80px 16px;
            margin: 0 auto;
        }

        .toc-header {
            position: sticky;
            top: 0;
            background: var(--c-bg);
            /* Ensure background is opaque */
            z-index: 100;
            padding: 12px 0;
            border-bottom: 1px solid var(--c-border);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .toc-back-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--c-text);
            display: flex;
            align-items: center;
            padding: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .toc-back-btn:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .toc-title {
            font-size: 1.1rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .novel-info-summary {
            margin-bottom: 32px;
            padding: 20px;
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: 12px;
        }

        .chapter-title {
            margin-top: 32px;
            font-weight: 700;
            font-size: 1.05rem;
            border-bottom: 2px solid var(--c-border);
            padding-bottom: 8px;
            margin-bottom: 12px;
            color: var(--c-accent);
        }

        .toc-item {
            padding: 14px 8px;
            border-bottom: 1px solid var(--c-border);
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
            display: flex;
            align-items: center;
        }

        .toc-item:active {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .toc-item.current {
            background-color: rgba(142, 53, 74, 0.08); /* accent with opacity */
            font-weight: 700;
            color: var(--c-accent);
            border-radius: 4px;
        }
        
        [data-theme="dark"] .toc-item.current {
            background-color: rgba(114, 137, 218, 0.2);
        }

        .toc-item:last-child {
            border-bottom: none;
        }
        
        /* Loading Spinner */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--c-accent);
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="toc-header">
            <button class="toc-back-btn" id="btn-back" title="戻る">
                <span class="material-symbols-rounded">arrow_back</span>
            </button>
            <div class="toc-title" id="header-title">目次</div>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <p style="text-align:center; opacity:0.6;">読み込み中...</p>
        </div>

        <div id="content" class="hidden">
            <div class="novel-info-summary">
                <h1 id="novel-title" style="font-size:1.3rem; margin-bottom:8px; line-height:1.4;"></h1>
                <div id="novel-author" style="font-size:0.9rem; opacity:0.8;"></div>
            </div>

            <div id="toc-list">
                <!-- JS Generated -->
            </div>
        </div>
    </div>

    <script type="module" src="/js/toc.js"></script>
</body>

</html>
