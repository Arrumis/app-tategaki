<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>読書モード - tategaki</title>
    <link rel="icon" href="/favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="no-scroll">
    <!-- Viewer Container: 縦書きスクロール領域 -->
    <div id="viewer-container">
        <div id="content-layer">
            <div id="novel-content">
                <h1 style="margin-left: 2em; font-size:1.5em;">読み込み中...</h1>
            </div>
        </div>
    </div>

    <!-- Reader Interaction Zones (One-tap action) -->
    <div id="tap-zone-next" title="次ページ"></div>
    <div id="tap-zone-prev" title="前ページ"></div>

    <!-- UI Layer: タップ操作やメニュー -->
    <div id="ui-layer">
        <!-- Center Tap Filter: 中央タップ検知用 -->
        <div id="tap-zone-center"></div>
        <!-- Prev/Next Tap Zone: 左右はJSで判定するか、全面のclickイベントから座標計算する -->

        <!-- Menu -->
        <div id="menu-overlay" class="menu-overlay">
            <div class="menu-grid">
                <!-- 上段: ナビゲーション (右開き: 進む=左, 戻る=右) -->

                <!-- 次話: 新しい話へ (左方向の極致) -->
                <button class="menu-btn-icon" id="btn-next-ep">
                    <span class="material-symbols-rounded">skip_previous</span>
                    <span class="btn-label">次話</span>
                </button>

                <!-- 次頁: 左へめくる -->
                <button class="menu-btn-icon" id="btn-next-page">
                    <span class="material-symbols-rounded">arrow_back_ios</span>
                    <span class="btn-label">次頁</span>
                </button>

                <button class="menu-btn-icon" id="btn-toc">
                    <span class="material-symbols-rounded">menu_book</span>
                    <span class="btn-label">目次</span>
                </button>

                <!-- 前頁: 右へめくる -->
                <button class="menu-btn-icon" id="btn-prev-page">
                    <span class="material-symbols-rounded">arrow_forward_ios</span>
                    <span class="btn-label">前頁</span>
                </button>

                <!-- 前話: 古い話へ (右方向の極致) -->
                <button class="menu-btn-icon" id="btn-prev-ep">
                    <span class="material-symbols-rounded">skip_next</span>
                    <span class="btn-label">前話</span>
                </button>

                <!-- 下段 -->
                <button class="menu-btn-icon" id="btn-bookmark">
                    <span class="material-symbols-rounded">bookmark_add</span>
                    <span class="btn-label">栞</span>
                </button>
                <button class="menu-btn-icon" id="btn-home" onclick="location.href='/'">
                    <span class="material-symbols-rounded">home</span>
                    <span class="btn-label">ホーム</span>
                </button>
                <button class="menu-btn-icon" id="btn-settings">
                    <span class="material-symbols-rounded">tune</span>
                    <span class="btn-label">設定</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel">
        <div class="panel-header">
            <h3>設定</h3>
            <button class="panel-close" onclick="closeSettings()">×</button>
        </div>
        <div class="panel-body">
            <div class="setting-item">
                <label>文字サイズ</label>
                <div class="setting-control segment-control" id="ctrl-font-size">
                    <button data-val="small">小</button>
                    <button data-val="medium" class="active">中</button>
                    <button data-val="large">大</button>
                    <button data-val="xlarge">特</button>
                </div>
            </div>
            <div class="setting-item">
                <label>行間・段落</label>
                <div class="setting-control segment-control" id="ctrl-line-height">
                    <button data-val="tight">狭</button>
                    <button data-val="normal" class="active">普</button>
                    <button data-val="relaxed">広</button>
                    <button data-val="loose">極</button>
                </div>
            </div>
            <div class="setting-item">
                <label>テーマ</label>
                <div class="setting-control theme-selector" id="ctrl-theme">
                    <button data-val="light" class="theme-btn light active">明</button>
                    <button data-val="sepia" class="theme-btn sepia">古</button>
                    <button data-val="dark" class="theme-btn dark">暗</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOC Panel -->
    <!-- TOC Panel Removed -->

    <!-- Backdrop for panels -->
    <div id="panel-backdrop" class="panel-backdrop" onclick="closeAllPanels()"></div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script type="module" src="/js/viewer.js"></script>
</body>

</html>
